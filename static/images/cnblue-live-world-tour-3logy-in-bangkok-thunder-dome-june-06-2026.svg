<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">CNBLUE 3LOGY Bangkok tickets artwork</title>
  <desc id="desc">Promotional ticket artwork for CNBLUE at Thunder Dome in the Bangkok metro area on June 6, 2026 with SomeTicket watermark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071a2b" />
      <stop offset="52%" stop-color="#0f3657" />
      <stop offset="100%" stop-color="#163b5c" />
    </linearGradient>
    <radialGradient id="glowLeft" cx="18%" cy="24%" r="38%">
      <stop offset="0%" stop-color="#2f80ed" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#2f80ed" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowRight" cx="84%" cy="18%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#09141f" stop-opacity="0" />
      <stop offset="60%" stop-color="#09141f" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#09141f" stop-opacity="0.8" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#glowLeft)" />
  <rect width="1600" height="900" fill="url(#glowRight)" />
  <rect y="650" width="1600" height="250" fill="url(#fade)" />

  <text x="110" y="108" fill="#c7d8e6" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="3">BANGKOK ROCK CONCERT</text>

  <rect x="1188" y="82" width="290" height="62" rx="31" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" />
  <text x="1232" y="121" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="1.2">JUNE 6, 2026</text>

  <text x="110" y="280" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="112" font-weight="700">CNBLUE</text>
  <text x="110" y="398" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="112" font-weight="700">3LOGY</text>
  <text x="110" y="452" fill="#d8e3ec" font-family="Arial, Helvetica, sans-serif" font-size="30">Thunder Dome, Bangkok metro area</text>
  <text x="110" y="496" fill="#d8e3ec" font-family="Arial, Helvetica, sans-serif" font-size="30">Premium-demand ticket guide</text>

  <rect x="1080" y="500" width="380" height="220" rx="28" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.14)" />
  <text x="1115" y="544" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="1.2">PRICE RANGE</text>
  <text x="1115" y="594" fill="#9ad1ff" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">THB 3,800 to THB 6,800</text>
  <text x="1115" y="646" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="24">Soundcheck and premium</text>
  <text x="1115" y="682" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="24">fan benefits in upper tiers</text>

  <image href="/images/watermark.png" x="1392" y="734" width="170" height="138" preserveAspectRatio="xMaxYMax meet" opacity="0.92" />
</svg>
