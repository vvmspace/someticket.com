<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Post Malone Bangkok tickets artwork</title>
  <desc id="desc">Promotional ticket artwork for Post Malone at Rajamangala National Stadium in Bangkok on September 22, 2026 with SomeTicket watermark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15060f" />
      <stop offset="48%" stop-color="#3b0e24" />
      <stop offset="100%" stop-color="#12070e" />
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="18%" r="34%">
      <stop offset="0%" stop-color="#ffb36b" stop-opacity="0.36" />
      <stop offset="100%" stop-color="#ffb36b" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8a3d" />
      <stop offset="100%" stop-color="#ffd166" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#glow)" />
  <rect x="76" y="76" width="1448" height="748" rx="28" fill="rgba(9,8,12,0.28)" stroke="rgba(255,255,255,0.14)" stroke-width="2" />

  <text x="114" y="122" fill="#f1d7c2" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="3">BANGKOK RAP CONCERT</text>
  <rect x="1168" y="84" width="314" height="64" rx="32" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)" />
  <text x="1213" y="124" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="1.2">SEPTEMBER 22, 2026</text>

  <text x="110" y="278" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="108" font-weight="700">POST MALONE</text>
  <text x="110" y="370" fill="url(#accent)" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="700" letter-spacing="2">BIG ASS STADIUM WORLD TOUR</text>
  <text x="110" y="430" fill="#f5e7dd" font-family="Arial, Helvetica, sans-serif" font-size="34">Rajamangala National Stadium   |   Bangkok   |   7:00 PM</text>
  <text x="110" y="484" fill="#f5e7dd" font-family="Arial, Helvetica, sans-serif" font-size="30">Featuring Don Toliver and a premium stadium-demand buyer guide</text>

  <rect x="1080" y="488" width="404" height="236" rx="30" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)" />
  <text x="1118" y="536" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="1.4">OFFICIAL PRICE RANGE</text>
  <text x="1118" y="596" fill="url(#accent)" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">THB 2,800 to THB 13,400</text>
  <text x="1118" y="650" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="24">VIP packages, seated bands,</text>
  <text x="1118" y="686" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="24">and standing inventory verified</text>

  <text x="112" y="726" fill="#d7b9a7" font-family="Arial, Helvetica, sans-serif" font-size="28">Exact-match source checked against ThaiTicketMajor and Live Nation Tero</text>

  <image href="/images/watermark.png" x="1368" y="740" width="194" height="118" preserveAspectRatio="xMaxYMax meet" opacity="0.92" />
</svg>
