{{ $page := . }}
{{ with site.Params.analytics.google_tag_id }}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ . }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    window.gtag = window.gtag || gtag;
    gtag("js", new Date());
    gtag("config", "{{ . }}", {
      anonymize_ip: true,
      page_title: {{ $page.Title | jsonify }},
      page_location: {{ $page.Permalink | jsonify }}
    });
  </script>
{{ end }}
